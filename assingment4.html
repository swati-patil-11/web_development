<!DOCTYPE html>
<html>
<head>
<style>
.body
{
width:500px;
height:500px;
margin:35%;
}
.head
{
width:500px;
border:2px solid black;
background-color:lightblue;
text-align:center;
padding:10px;
}
.list
{
padding :20px;
width:500px;
border:2px solid black;
border-radius:6px;
}

<body>
<h1 class ="head">Assigment no.4: Lists in html</h1>
<div class="list">
<h2>Ordered List</h2>
<ol>
 <li>Tea</li>
 <li>Coffee</li>
 <li>Cold-drink</li>
 <li>Milk</li>
</ol>

<h2>Unordered list</h2>
<ul>
 <li> Item 1</li>
 <li> Item 2</li>
 <li> Item 3</li>
 <li> Item 4</li>
</ul>

<h2>Description list</h2>
<dl>
<dt>1. Apple</dt>
<dd>-Red colored fruit</dd>
<dt>2. Orange</dt>
<dd>-Orange coloured fruit</dd>
<dt>3. Banana</dt>
<dd>-Yellow coloured fruit</dd>
</div>
